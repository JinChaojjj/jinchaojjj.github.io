<h2 id="前缀和的应用场景">前缀和的应用场景</h2>
<p>前缀和对于同一个数列中需要反复求解区间和的场景的帮助是十分大的，不使用区间和时时间复杂度为o(n*m),使用区间和时间复杂度为o(n+m),时间复杂度是肉眼可见的降低了一个数量级.</p>
<h2 id="差分的应用场景">差分的应用场景</h2>
<p>差分其实就是前缀和的一个逆推,对于一个数列需要反复进行区间上的加减时效果非常好</p>
